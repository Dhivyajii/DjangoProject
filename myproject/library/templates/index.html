{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>
<body>
    <nav>
        <div class="logo"><h1>Welcome to Django </h1></div>
         <div class="links">
            <a href="{% url 'add_book' %}">AddBook</a>
         <a href="{% url 'about' %}">About</a>
         <a href="{% url 'contact' %}">Contact</a></div>
    </nav>
    <div class="books">
        {% for book in books %}
           <p>Book title: {{book.title|upper}}</p>
           <p>Status: {{book.is_available}}</p>
           <a href="{% url 'update_book' book.id %}">Edit</a> | 
            <a href="{% url 'delete_book' book.id %}" style="color: red;">Delete</a>
        {% endfor %}

    </div>
   
</body>
</html>
